name: Collector dry run
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python scripts/collect.py --dry-run
