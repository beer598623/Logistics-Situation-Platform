name: Collector contract dry run

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install locked runtime dependencies
        run: python -m pip install -r requirements.lock
      # No source in config/sources.yaml is enabled, so there is nothing to
      # collect live. This job validates contracts offline and stops there.
      # Live source contact remains confined to manual-live-source-test.yml.
      - name: Validate source contracts without network access
        run: python scripts/collect.py --dry-run
      - name: Confirm no source is enabled for live collection
        run: |
          python - <<'PY'
          import sys, yaml
          registry = yaml.safe_load(open("config/sources.yaml", encoding="utf-8"))
          enabled = [s["id"] for s in registry["sources"] if s["enabled"]]
          if enabled:
              print(f"Sources marked enabled: {enabled}")
              print("Live collection requires a reviewed enablement decision and a")
              print("controlled live validation. This workflow does not perform one.")
              sys.exit(1)
          print("No source is enabled; nothing to collect.")
          PY
      - name: Confirm public data is unchanged
        if: always()
        run: |
          git status --porcelain data dashboard/public
          test -z "$(git status --porcelain data dashboard/public)"
