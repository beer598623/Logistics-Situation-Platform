name: Collector contract dry run

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install locked runtime dependencies
        run: python -m pip install -r requirements.lock
      - name: Validate source contracts without network access
        run: python scripts/collect.py --dry-run
