name: Repository health check
on:
  schedule:
    - cron: '17 0 * * 1'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: test -f dashboard/public/index.html
      - run: python -m json.tool data/reviewed/current_events.json >/dev/null
      - run: python -m json.tool config/task_manifest.json >/dev/null
