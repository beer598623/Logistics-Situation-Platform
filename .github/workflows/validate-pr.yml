name: Validate repository

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.txt
      - name: Install locked runtime and quality tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock pytest==9.1.1 ruff==0.15.22
      - name: Collect Ruff diagnostics
        id: ruff
        shell: bash
        run: |
          set +e
          ruff check collectors scripts tests --output-format=concise > ruff-check.txt 2>&1
          check_status=$?
          ruff format --diff collectors scripts tests > ruff-format.txt 2>&1
          format_status=$?
          echo "check_status=$check_status" >> "$GITHUB_OUTPUT"
          echo "format_status=$format_status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload Ruff diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-diagnostics
          path: |
            ruff-check.txt
            ruff-format.txt
          if-no-files-found: error
      - name: Enforce Ruff quality gate
        env:
          CHECK_STATUS: ${{ steps.ruff.outputs.check_status }}
          FORMAT_STATUS: ${{ steps.ruff.outputs.format_status }}
        run: |
          cat ruff-check.txt
          cat ruff-format.txt
          test "$CHECK_STATUS" = "0"
          test "$FORMAT_STATUS" = "0"
      - name: Validate data contracts
        run: python scripts/validate.py
      - name: Dry-run source contracts
        run: python scripts/collect.py --dry-run
      - name: Build dashboard
        run: python scripts/build_dashboard.py
      - name: Run tests
        run: pytest
