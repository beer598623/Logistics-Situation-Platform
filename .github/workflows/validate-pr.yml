name: Validate repository

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.txt
      - name: Install locked runtime and quality tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock pytest==9.1.1 ruff==0.15.22
      - name: Lint Python
        run: ruff check collectors scripts tests
      - name: Check Python formatting
        run: ruff format --check collectors scripts tests
      - name: Validate data contracts
        run: python scripts/validate.py
      - name: Dry-run source contracts
        run: python scripts/collect.py --dry-run
      - name: Build dashboard
        run: python scripts/build_dashboard.py
      - name: Run tests
        run: pytest
