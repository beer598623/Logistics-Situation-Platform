name: Manual live source test (GDACS / TMD CAP)

# workflow_dispatch only. Do not add `schedule:` or a `push:`/`pull_request:`
# trigger to this workflow -- it is the one place in the repository allowed
# to make a live network call to GDACS or TMD, and it must stay
# human-triggered per WO-002 Implementation v0.2 (Issue #5).
on:
  workflow_dispatch:
    inputs:
      source:
        description: "Source to test"
        required: true
        type: choice
        options:
          - gdacs
          - tmd_cap
      dry_run:
        description: "true: validate request construction only (no network call). false: perform one live fetch."
        required: true
        type: choice
        default: "true"
        options:
          - "true"
          - "false"
      from_date:
        description: "GDACS only: SEARCH fromdate (YYYY-MM-DD)"
        required: false
        type: string
      to_date:
        description: "GDACS only: SEARCH todate (YYYY-MM-DD)"
        required: false
        type: string
      event_types:
        description: "GDACS only: comma-separated eventtype filter (e.g. EQ,TC)"
        required: false
        type: string
      alert_levels:
        description: "GDACS only: comma-separated alertlevel filter (e.g. Orange,Red)"
        required: false
        type: string
      language:
        description: "TMD CAP only: 'primary' (English) or an alternate_endpoints label (e.g. thai_language_cap)"
        required: false
        type: string
        default: "primary"
      tmd_operation:
        description: "TMD CAP only: 'direct_cap' (current strict CAP behavior), 'rss_discovery' (classify and inspect one RSS envelope only, no fetch of items/enclosures), or 'candidate_cap_validation' (WO-006: validate exactly one human-selected candidate CAP file via the DNS-pinned candidate transport)"
        required: false
        type: choice
        default: "direct_cap"
        options:
          - direct_cap
          - rss_discovery
          - candidate_cap_validation
      candidate_filename:
        description: "candidate_cap_validation only: a bare filename matching CAPTMD<14 digits>_<digits>.xml, as observed in a reviewed WO-005 discovery artifact -- never a URL, path, or host"
        required: false
        type: string
      candidate_evidence_run_id:
        description: "candidate_cap_validation only: the WO-005 discovery workflow run ID the candidate filename was observed in (provenance only)"
        required: false
        type: string
      candidate_item_index:
        description: "candidate_cap_validation only: the discovery item index (0-49) the candidate filename was observed at"
        required: false
        type: string

permissions:
  contents: read

jobs:
  manual-live-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install locked runtime dependencies
        run: python -m pip install -r requirements.lock

      - name: Run controlled manual live-test script
        env:
          SOURCE: ${{ inputs.source }}
          DRY_RUN: ${{ inputs.dry_run }}
          FROM_DATE: ${{ inputs.from_date }}
          TO_DATE: ${{ inputs.to_date }}
          EVENT_TYPES: ${{ inputs.event_types }}
          ALERT_LEVELS: ${{ inputs.alert_levels }}
          LANGUAGE: ${{ inputs.language }}
          TMD_OPERATION: ${{ inputs.tmd_operation }}
          CANDIDATE_FILENAME: ${{ inputs.candidate_filename }}
          CANDIDATE_EVIDENCE_RUN_ID: ${{ inputs.candidate_evidence_run_id }}
          CANDIDATE_ITEM_INDEX: ${{ inputs.candidate_item_index }}
        run: |
          python scripts/manual_live_source_test.py \
            --source "$SOURCE" \
            --dry-run "$DRY_RUN" \
            --from-date "$FROM_DATE" \
            --to-date "$TO_DATE" \
            --event-types "$EVENT_TYPES" \
            --alert-levels "$ALERT_LEVELS" \
            --language "$LANGUAGE" \
            --tmd-operation "$TMD_OPERATION" \
            --candidate-filename "$CANDIDATE_FILENAME" \
            --candidate-evidence-run-id "$CANDIDATE_EVIDENCE_RUN_ID" \
            --candidate-item-index "$CANDIDATE_ITEM_INDEX"

      # Scope F (WO-004): this check must still run even when the script
      # step above failed (an expected adapter/parser failure, e.g. a
      # strict CAP rejection of an RSS envelope, still exits non-zero) --
      # a skipped safety check is itself a gap. `if: always()` does not
      # weaken the gate: the job still fails if the script step failed,
      # and this step's own `test -z` still fails the job independently if
      # a forbidden path was touched.
      - name: Confirm public dashboard/current-event data are unchanged
        if: always()
        run: |
          git status --porcelain data/candidates data/reviewed data/source_status dashboard/public/data
          test -z "$(git status --porcelain data/candidates data/reviewed data/source_status dashboard/public/data)"

      - name: Upload redacted manual-test report only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manual-live-test-report-${{ inputs.source }}
          path: manual_live_test_output/report.json
          if-no-files-found: error
          retention-days: 14
